name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node --print \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node --print \"JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version\")" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: npm
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.package.outputs.name }}"
          VERSION="${{ steps.package.outputs.version }}"

          if npm view "${NAME}@${VERSION}" version --silent >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published to npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm authentication
        if: steps.npm.outputs.already_published != 'true'
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: steps.npm.outputs.already_published != 'true'
        run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}